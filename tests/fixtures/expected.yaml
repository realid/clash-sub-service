port: 1082
socks-port: 1083
allow-lan: true
mode: rule
log-level: warning
external-controller: 127.0.0.1:9090
proxies:
- name: ss@example.com:443
  type: ss
  server: example.com
  port: 443
  cipher: aes-256-gcm
  password: pass
  udp: true
proxy-groups:
- name: MANUAL
  type: select
  proxies:
  - ss@example.com:443
rules:
- GEOIP,LAN,DIRECT,no-resolve
- GEOIP,CN,DIRECT
- MATCH,MANUAL
bind-address: '*'
